<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>

<body>

    <form id="registrationForm">
        <div class="wrapper">
            <div class="form-group">
                <label for="Email">Email</label>
                <input type="text" id="Email" required>
            </div>
            <span id="emailError" class="error-msg" style="display: none;">Please enter a valid @gmail.com
                address</span>

            <div class="form-group">
                <label for="Phone">Phone</label>
                <input type="text" id="Phone" maxlength="10" required>
            </div>
            <span id="phoneError" class="error-msg" style="display: none;">Must be exactly 10 digits</span>

            <div class="form-group">
                <label for="Password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="Password" required>
                    <button type="button" id="togglePassword">Show</button>
                </div>
            </div>
            <span id="passwordError" class="error-msg" style="display: none;">Min 8 chars, 1 upper, 1 lower, 1
                number</span>

            <input type="submit" id="submit" value="Submit">
        </div>
    </form>

    <script src="script.js">
    </script>

</body>

</html>
